# Company 2nd Brain server configuration
# Ships with ONE client — the admin agent. Add more with ./brain add-agent
# (or scripts/add-agent.sh); never by hand unless you know the rules below.
# Validation: exactly one admin client, unique names, valid globs; the
# server refuses to boot otherwise.
#
# The operations/staff roles below are ready-made permission profiles for
# agents you add later; defining a role grants nothing until a client uses it.

vault_root: /vault
audit_dir: /audit

clients:
  - name: admin
    token_hash_env: MCP_TOKEN_HASH_ADMIN
    role: admin

roles:
  admin:
    read:  ["**"]
    write: ["**"]
    deny:  ["_Audit/**", "_System/Access and Contribution Rules.md", ".obsidian/**"]
  operations:
    read:  ["40 Properties/**", "50 Operations/**", "70 Meetings/**", "20 People/**", "30 Projects/**", "_System/**"]
    write: ["40 Properties/**", "50 Operations/**", "70 Meetings/**", "90 Staff Inbox/{client}/**"]
    deny:  ["_Audit/**", ".obsidian/**"]
  staff:
    read:  ["50 Operations/Procedures/**", "40 Properties/**", "_System/**"]
    write: ["90 Staff Inbox/{client}/**"]
    deny:  ["_Audit/**", ".obsidian/**"]

limits:
  requests_per_minute: 60
  max_note_bytes: 1048576
